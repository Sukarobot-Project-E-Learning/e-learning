name: Promote Staging to Production Repo

on:
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout staging repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to production repository
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          # Add production remote
          git remote add production git@github.com:Sukarobot-Project-E-Learning/sukarobot-elearning-demo.git
          
          # Fetch production's main branch to get its current workflows
          git fetch production main --depth=1
          
          # Save production's workflows
          mkdir -p /tmp/prod-workflows
          git show production/main:.github/workflows/ > /tmp/prod-workflows-tar 2>/dev/null || echo "No workflows on production yet"
          
          # Create a temporary branch with staging code
          git checkout -b temp-prod-sync main
          
          # Push staging code to production
          echo "🚀 Syncing code to production..."
          git push production temp-prod-sync:main --force
          
          # Restore production's workflows if they existed
          git checkout production/main -- .github/workflows/ 2>/dev/null || echo "Keeping staging workflows for first sync"
          
          # Commit the workflow restoration
          git add .github/workflows/
          if ! git diff --cached --quiet; then
            git commit -m "Restore production's workflows"
            git push production HEAD:main --force
            echo "✅ Production workflows restored"
          else
            echo "✅ Workflows already in sync"
          fi